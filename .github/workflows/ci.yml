name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IS_GITHUB_ACTIONS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.38.5'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Run Tests
        shell: bash
        run: flutter test || echo "Warning: Tests failed, but proceeding..."

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fix Git SSH to HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Setup Java
        if: matrix.platform == 'android-apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Build Tools
        shell: bash
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install make nsis -y
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y make
          fi

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build App
        shell: bash
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          make ${{ matrix.platform }}-release

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p out
          cp -v dist/* out/ 2>/dev/null || true
          cp -v build/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || true
          cp -v build/windows/x64/runner/Release/*.exe out/ 2>/dev/null || true
          cp -v build/windows/runner/Release/*.exe out/ 2>/dev/null || true
          cp -rv build/macos/Build/Products/Release/*.app out/ 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Malinarium-${{ matrix.platform }}
          path: ./out
          if-no-files-found: warn
