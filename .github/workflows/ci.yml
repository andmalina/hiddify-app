name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/'
      - 'appcast.xml'
  push:
    branches:
      - main
      - dev
      - android-fix-action-bug
      - new-design-v2 
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/'
      - 'appcast.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Добавляем этот блок, чтобы убрать предупреждение о Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    # Права доступа для работы с релизами и артефактами
    permissions:
      contents: write
      actions: write
      pull-requests: write
      id-token: write
      attestations: write
      packages: write
    if: "${{!contains(github.event.head_commit.message, 'release: version')}}"
    with:
      upload-artifact: ${{ github.event_name == 'push' }}
