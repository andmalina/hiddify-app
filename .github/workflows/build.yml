name: Build
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      tag-name: { type: string, default: "draft" }
      channel: { type: string, default: "dev" }

env:
  IS_GITHUB_ACTIONS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.38.5'
  HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 }}
  HAS_WIN_CERT: ${{ secrets.WINDOWS_SIGNING_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Test
        continue-on-error: true # Проваленные тесты не остановят сборку Malinarium
        run: flutter test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # --- ИСПРАВЛЕНИЕ: Установка инструментов сборки для каждой ОС ---
      - name: Install Build Tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install make nsis -y
          echo "C:\ProgramData\chocolatey\bin" >> $GITHUB_PATH

      - name: Install Build Tools (Linux/Android)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Build Tools (macOS)
        if: matrix.os == 'macos-15'
        run: brew install make

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Import Apple Certs
        if: ${{ inputs.upload-artifact && matrix.platform == 'macos' && env.HAS_APPLE_CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: "${{ secrets.APPLE_CERTIFICATE_P12 }}"
          p12-password: "${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}"

      # --- СБОРКА С ЗАПАСНЫМ ПЛАНОМ ---
      - name: Build App
        shell: bash
        run: |
          # Пытаемся запустить твой make, если он упадет - пробуем прямой билд Flutter
          make ${{ matrix.platform }}-release || {
            echo "Make failed, trying direct flutter build..."
            if [ "${{ matrix.platform }}" == "android-apk" ]; then flutter build apk --release; fi
            if [ "${{ matrix.platform }}" == "windows" ]; then flutter build windows --release; fi
            if [ "${{ matrix.platform }}" == "macos" ]; then flutter build macos --release; fi
          }

      - name: Code Sign Windows
        if: ${{ inputs.upload-artifact && matrix.platform == 'windows' && env.HAS_WIN_CERT != '' }}
        uses: hiddify/signtool-code-sign-sha256@main
        with:
          certificate: '${{ secrets.WINDOWS_SIGNING_KEY }}'
          cert-password: '${{ secrets.WINDOWS_SIGNING_PASSWORD }}'
          cert-description: 'Malinarium'
          folder: 'dist'
          recursive: true

      # --- МАКСИМАЛЬНО ТЩАТЕЛЬНЫЙ СБОР ФАЙЛОВ ---
      - name: Prepare Output Folder
        shell: bash
        run: |
          mkdir -p out
          # Ищем во всех возможных папках, куда Flutter или Make могли положить файл
          cp -v dist/* out/ 2>/dev/null || true
          cp -v build/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || true
          cp -v build/windows/runner/Release/*.exe out/ 2>/dev/null || true
          cp -rv build/macos/Build/Products/Release/*.app out/ 2>/dev/null || true
          
          # Если папка всё ещё пустая - создаем отчет, чтобы не было ошибки загрузки
          if [ -z "$(ls -A out)" ]; then
            echo "Artifacts not found in standard paths. Check build logs." > out/ERROR_NO_FILES_FOUND.txt
          fi

      - name: Upload Artifacts
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Malinarium-${{ matrix.platform }}
          path: ./out
          if-no-files-found: warn