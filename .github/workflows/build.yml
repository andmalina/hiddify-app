name: Build
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      tag-name: { type: string, default: "draft" }
      channel: { type: string, default: "dev" }

env:
  IS_GITHUB_ACTIONS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.38.5'
  # Пробрасываем секреты в env для безопасной проверки в if
  HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 }}
  HAS_WIN_CERT: ${{ secrets.WINDOWS_SIGNING_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Test
        continue-on-error: true
        run: flutter test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Import Apple Certs
        # Используем env вместо secrets для проверки
        if: ${{ inputs.upload-artifact && startsWith(matrix.os,'macos') && env.HAS_APPLE_CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: "${{ secrets.APPLE_CERTIFICATE_P12 }}"
          p12-password: "${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build
        run: make ${{ matrix.platform }}-release || echo "Build failed"

      - name: Code Sign Windows
        # Используем env вместо secrets для проверки
        if: ${{ inputs.upload-artifact && matrix.platform == 'windows' && env.HAS_WIN_CERT != '' }}
        uses: hiddify/signtool-code-sign-sha256@main
        with:
          certificate: '${{ secrets.WINDOWS_SIGNING_KEY }}'
          cert-password: '${{ secrets.WINDOWS_SIGNING_PASSWORD }}'
          cert-description: 'Malinarium'
          folder: 'dist'
          recursive: true

      - name: Prepare Out
        shell: bash
        run: |
          mkdir -p out
          cp -r dist/* out/ 2>/dev/null || cp -r build/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || echo "No files"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ./out
          if-no-files-found: warn