name: Build
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      tag-name: { type: string, default: "draft" }
      channel: { type: string, default: "dev" }

env:
  IS_GITHUB_ACTIONS: 1
  # Убираем предупреждения о Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.38.5'
  # Безопасная проверка наличия секретов
  HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 }}
  HAS_WIN_CERT: ${{ secrets.WINDOWS_SIGNING_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Test
        # Позволяем сборке продолжаться, даже если тесты упали
        continue-on-error: true
        run: flutter test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # КРИТИЧНО ДЛЯ WINDOWS: устанавливаем инструменты для выполнения команды make и создания .exe
      - name: Install Windows Build Tools
        if: matrix.platform == 'windows'
        run: |
          choco install make nsis -y

      - name: Import Apple Certs
        if: ${{ inputs.upload-artifact && matrix.platform == 'macos' && env.HAS_APPLE_CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: "${{ secrets.APPLE_CERTIFICATE_P12 }}"
          p12-password: "${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}"

      - name: Build App
        # Убрали заглушку "|| echo", чтобы видеть реальную причину в случае падения
        run: make ${{ matrix.platform }}-release

      - name: Code Sign Windows
        if: ${{ inputs.upload-artifact && matrix.platform == 'windows' && env.HAS_WIN_CERT != '' }}
        uses: hiddify/signtool-code-sign-sha256@main
        with:
          certificate: '${{ secrets.WINDOWS_SIGNING_KEY }}'
          cert-password: '${{ secrets.WINDOWS_SIGNING_PASSWORD }}'
          cert-description: 'Malinarium'
          folder: 'dist'
          recursive: true

      - name: Prepare Output Folder
        shell: bash
        run: |
          mkdir -p out
          echo "Searching for build artifacts..."
          
          # 1. Проверяем папку dist (куда обычно складывает make)
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            cp -v dist/* out/ 2>/dev/null || true
          fi
          
          # 2. Если пусто, ищем стандартный APK
          if [ -d "build/app/outputs/flutter-apk" ]; then
            cp -v build/app/outputs/flutter-apk/*.apk out/ 2>/dev/null || true
          fi
          
          # 3. Если пусто, ищем стандартный Windows EXE
          if [ -d "build/windows/runner/Release" ]; then
            cp -v build/windows/runner/Release/*.exe out/ 2>/dev/null || true
          fi
          
          # Проверка: если в папке out всё еще пусто, создаем лог-файл, чтобы билд не падал совсем молча
          if [ -z "$(ls -A out)" ]; then
            echo "No artifacts found in expected locations" > out/build_log.txt
          fi

      - name: Upload Artifacts
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Malinarium-${{ matrix.platform }}
          path: ./out
          # Если файлов нет — мы хотим об этом знать
          if-no-files-found: warn